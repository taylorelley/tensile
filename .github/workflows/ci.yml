name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Build · Test · Replay Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tensile-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tensile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Replay gate
        run: npm run replay:gate
